name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: lifebot-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: lifebot-windows-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lifebot-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri --
          args: --target ${{ matrix.target }}

      - name: Collect bundles (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb staging/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage staging/ 2>/dev/null || true

      - name: Collect bundles (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" staging/ -ErrorAction SilentlyContinue
          Copy-Item "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" staging/ -ErrorAction SilentlyContinue

      - name: Collect bundles (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg staging/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
