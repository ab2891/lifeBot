name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lifebot-linux-x64
          - os: windows-latest
            artifact: lifebot-windows-x64
          - os: macos-latest
            artifact: lifebot-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run frontend:build

      - name: Build Tauri app (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: apps/desktop
        run: |
          ICONS="$GITHUB_WORKSPACE/apps/desktop/src-tauri/icons"
          npx tauri build --config "{\"bundle\":{\"icon\":[\"$ICONS/icon.png\",\"$ICONS/32x32.png\",\"$ICONS/128x128.png\",\"$ICONS/128x128@2x.png\",\"$ICONS/icon.icns\",\"$ICONS/icon.ico\"]}}"

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $icons = ("$env:GITHUB_WORKSPACE/apps/desktop/src-tauri/icons" -replace '\\','/')
          $cfg = @{ bundle = @{ icon = @("$icons/icon.png","$icons/32x32.png","$icons/128x128.png","$icons/128x128@2x.png","$icons/icon.icns","$icons/icon.ico") } }
          $cfg | ConvertTo-Json -Depth 5 -Compress | Set-Content -Path tauri-ci.json
          npx tauri build --config tauri-ci.json

      - name: Collect bundles (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/release/bundle/deb/*.deb staging/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage staging/ 2>/dev/null || true

      - name: Collect bundles (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/release/bundle/msi/*.msi" staging/ -ErrorAction SilentlyContinue
          Copy-Item "target/release/bundle/nsis/*.exe" staging/ -ErrorAction SilentlyContinue

      - name: Collect bundles (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/release/bundle/dmg/*.dmg staging/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
